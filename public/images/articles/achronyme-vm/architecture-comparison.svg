<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8fafc" rx="8" />

  <!-- Stack VM Side -->
  <g transform="translate(50, 50)">
    <text x="150" y="20" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle" fill="#0f172a">Stack-Based VM</text>
    
    <!-- Code block -->
    <rect x="0" y="40" width="120" height="140" fill="#334155" rx="4" />
    <text x="10" y="60" font-family="monospace" font-size="14" fill="#60a5fa">PUSH b</text>
    <text x="10" y="85" font-family="monospace" font-size="14" fill="#60a5fa">PUSH c</text>
    <text x="10" y="110" font-family="monospace" font-size="14" fill="#f472b6">ADD</text>
    <text x="10" y="135" font-family="monospace" font-size="14" fill="#a78bfa">POP a</text>
    <text x="60" y="165" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">Bytecode (4 bytes)</text>

    <!-- Stack -->
    <rect x="180" y="40" width="100" height="200" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2" rx="4" />
    <path d="M 180,90 L 280,90 M 180,140 L 280,140 M 180,190 L 280,190" stroke="#cbd5e1" stroke-width="2" />
    <text x="230" y="255" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle" fill="#475569">Operand Stack</text>
    
    <!-- Stack values -->
    <text x="230" y="75" font-family="monospace" font-size="16" text-anchor="middle" fill="#0f172a">val(c)</text>
    <text x="230" y="125" font-family="monospace" font-size="16" text-anchor="middle" fill="#0f172a">val(b)</text>

    <!-- Arrows -->
    <path d="M 130,55 L 170,55" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)" />
    <path d="M 130,80 L 170,80" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)" />
    <path d="M 180,105 C 150,105 150,115 130,105" stroke="#f472b6" stroke-width="2" fill="none" marker-end="url(#arrowPink)" />
  </g>

  <!-- Divider -->
  <line x1="400" y1="40" x2="400" y2="360" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8,8" />

  <!-- Register VM Side -->
  <g transform="translate(450, 50)">
    <text x="150" y="20" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle" fill="#0f172a">Register-Based VM</text>
    
    <!-- Code block -->
    <rect x="0" y="40" width="160" height="50" fill="#334155" rx="4" />
    <text x="10" y="70" font-family="monospace" font-size="14" fill="#34d399">ADD R(a), R(b), R(c)</text>
    <text x="80" y="110" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">Bytecode (4 bytes)</text>

    <!-- Registers -->
    <rect x="200" y="40" width="100" height="200" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2" rx="4" />
    <path d="M 200,90 L 300,90 M 200,140 L 300,140 M 200,190 L 300,190" stroke="#cbd5e1" stroke-width="2" />
    <text x="250" y="255" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle" fill="#475569">Virtual Registers</text>
    
    <!-- Register values -->
    <text x="210" y="75" font-family="monospace" font-size="12" fill="#64748b">R(a)</text>
    <text x="260" y="75" font-family="monospace" font-size="16" fill="#0f172a">val(a)</text>
    
    <text x="210" y="125" font-family="monospace" font-size="12" fill="#64748b">R(b)</text>
    <text x="260" y="125" font-family="monospace" font-size="16" fill="#0f172a">val(b)</text>

    <text x="210" y="175" font-family="monospace" font-size="12" fill="#64748b">R(c)</text>
    <text x="260" y="175" font-family="monospace" font-size="16" fill="#0f172a">val(c)</text>

    <!-- Arrows -->
    <path d="M 170,65 L 190,65" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)" />
  </g>

  <!-- Definitions for arrows -->
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa" />
    </marker>
    <marker id="arrowPink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f472b6" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399" />
    </marker>
  </defs>
</svg>